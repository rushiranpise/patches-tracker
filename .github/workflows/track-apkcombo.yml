name: Generate APKCombo tracker config

on:
  workflow_dispatch:
  schedule:
    - cron: "41 8 * * 1"

permissions:
  contents: write

jobs:
  generate-apkcombo-config:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout tracker
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Clone patches repo
        env:
          GH_TOKEN: ${{ secrets.PATCHES_REPO_TOKEN || secrets.GITHUB_TOKEN }}
        run: gh repo clone rushiranpise/morphe-patches .work/morphe-patches -- --branch dev --depth 1

      - name: Generate APKCombo tracker config
        run: |
          python scripts/generate-config-from-constants.py \
            --constants .work/morphe-patches/patches/src/main/kotlin/app/template/patches/shared/Constants.kt \
            --output config.generated.toml \
            --patches-repo rushiranpise/morphe-patches \
            --target-branch dev

      - name: Commit generated config
        run: |
          git config user.name "patches-tracker"
          git config user.email "patches-tracker@users.noreply.github.com"
          git add config.generated.toml
          if git diff --cached --quiet; then
            echo "No generated config changes."
          else
            git commit -m "chore: update generated APKCombo config [skip ci]"
            git push
          fi
